about: I am a fourth-year PhD candidate in Engineering at the Institute for Manufacturing (IfM), University of Cambridge, supervised by Tim Minshall and Veronica Martinez. My research examines how algorithmic systems reshape human discretion and analytical creativity, with a particular focus on the distinction between algorithmic management and algorithmic enablement. Empirically, I draw on longitudinal fieldwork in algorithmic trading environments and large-scale venture capital deal data. I also founded LLM+, a global AI research community. I hold a Cambridge Trust International Scholarship and am a Fellow of the Royal Society of Arts. My interest in complex networks stems from the relational and structural dimensions of the phenomena I study, from VC syndication networks and supply chain interdependencies to the diffusion of AI capabilities across institutional boundaries.
