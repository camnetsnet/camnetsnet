about: MPhil student in Cognitive Neuroscience at the University of Cambridge with interests in computational and systems approaches to understanding cognition. My work focuses on the micro-scale information processing deficits underlying disease in neural populations in culture. I am particularly interested in biologically inspired neural networks and how principles from neuroscience can inform artificial intelligence.
