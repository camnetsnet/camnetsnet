about: |-
  David Jones is a first-year PhD researcher at the University of Cambridge Department of Engineering, where he studies the energy consumption and carbon emissions of digital infrastructure across Africa. His research spans two connected tracks: a continental-scale systems model of African digital infrastructure energy and emissions (built from first principles across all 54 nations), and the waste heat recovery potential of urban edge data centres, including supply-demand matching across city-scale heat networks. He is supervised by Dr André Cabrera Serrenho at Pembroke College.
  David brings 15 years of telecoms and digital infrastructure experience, including leading Project Green at IHS Towers Nigeria, the largest solar energy transformation programme across the company's 36,000-tower African portfolio. That experience, observing diesel consumption continue to grow despite significant solar deployment, motivates his current research focus.
  Alongside his PhD, he is founder of Airtec, an AI-optimised cooling startup for data centres, and a Managing Consultant at Cambridge Management Consulting.
