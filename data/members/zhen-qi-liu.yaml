about: Royal Society Newton International Fellow at the Department of Psychiatry and Junior Research Fellow at Wolfson College. I completed my PhD in Neuroscience at Montreal Neurological Institute & McGill University, where I studied how the brain's anatomical wiring relates to functional dynamics. At Cambridge, I'm examining how genetic risk affects brain organization and developing computational tools to study multimodal brain maps across species.
