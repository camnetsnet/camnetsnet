about: I am a PhD student in History and Philosophy of Science at Cambridge, working in collaboration with the Royal Botanic Gardens, Kew. My doctoral project analyses the social networks of colonial plant collectors in the long nineteenth century, using Kew Herbarium specimen data to explore the global dynamics of plant and knowledge exchange in the British Empire.
